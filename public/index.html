<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyPace | Plano pessoal</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <section class="auth-view" id="authView" hidden>
      <form class="login-card" id="loginForm">
        <div class="login-brand-stack">
          <div class="login-mark">MP</div>
          <p class="eyebrow">MyPace</p>
          <h1>MyPace</h1>
          <p class="login-copy">Seu ambiente para organizar suas corridas!</p>
        </div>

        <label>
          Usuário ou email
          <input id="loginEmail" type="text" autocomplete="username" value="guilherme" required />
        </label>

        <label>
          Senha
          <input id="loginPassword" type="password" autocomplete="current-password" minlength="6" required />
        </label>

        <button class="button primary" id="signInBtn" type="submit">
          <i data-lucide="log-in"></i>
          <span>Entrar</span>
        </button>

        <p class="inline-error" id="authMessage"></p>
      </form>
    </section>

    <div class="app-view" id="appView" hidden>
      <aside class="app-sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark">MP</div>
          <div>
            <strong>MyPace</strong>
            <span>Plano pessoal</span>
          </div>
        </div>

        <nav class="main-nav" aria-label="Navegação principal">
          <button class="nav-item is-active" data-view="dashboard" type="button">
            <i data-lucide="calendar-check"></i>
            <span>Hoje</span>
          </button>
          <button class="nav-item" data-view="workout" type="button">
            <i data-lucide="list-checks"></i>
            <span>Plano</span>
          </button>
          <button class="nav-item" data-view="athlete" type="button">
            <i data-lucide="gauge"></i>
            <span>Ritmos</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="button ghost" id="themeToggleBtn" type="button">
            <i data-lucide="moon"></i>
            <span>Tema</span>
          </button>
          <button class="button ghost" id="logoutBtn" type="button">
            <i data-lucide="log-out"></i>
            <span>Sair</span>
          </button>
        </div>
      </aside>

      <main class="app-main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="viewEyebrow">Meu plano</p>
            <h1 id="viewTitle">Treinos da semana</h1>
          </div>

          <div class="topbar-actions">
            <div class="athlete-select">
              <div class="avatar" id="selectedAvatar">G</div>
              <div>
                <strong id="selectedAthleteName">Guilherme</strong>
                <span id="currentWeekLabel">Semana atual</span>
              </div>
            </div>
            <span class="save-state" id="saveState">carregando</span>
          </div>
        </header>

        <section class="content-shell" id="mainContent">
          <div class="skeleton-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </section>
      </main>

      <div class="toast" id="toast" hidden>
        <i data-lucide="check-circle-2"></i>
        <span>Salvo</span>
      </div>
    </div>
  </body>
</html>
