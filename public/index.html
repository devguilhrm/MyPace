<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyPace | Guilherme</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <section class="auth-view" id="authView" hidden>
      <div class="auth-shell">
        <form class="login-panel" id="loginForm">
          <div class="login-brand">
            <p class="eyebrow">MyPace</p>
            <h1>Entrar no plano</h1>
            <p>Meia maratona de Aracaju 2026</p>
          </div>

          <div class="panel-heading">
            <h2>Entrar</h2>
            <span id="authModeLabel">Supabase</span>
          </div>

          <label>
            Usuario ou email
            <input id="loginEmail" type="text" autocomplete="username" value="guilherme" required />
          </label>

          <label>
            Senha
            <input id="loginPassword" type="password" autocomplete="current-password" minlength="6" required />
          </label>

          <button class="button primary" id="signInBtn" type="submit">
            <i data-lucide="log-in"></i>
            <span>Entrar</span>
          </button>

          <p class="auth-message" id="authMessage"></p>
        </form>
      </div>
    </section>

    <div class="app-view" id="appView" hidden>
      <header class="app-header">
        <div class="brand">
          <p class="eyebrow">MyPace</p>
          <h1>Guilherme</h1>
        </div>
        <div class="toolbar">
          <span class="save-state" id="saveState">carregando</span>
          <button class="icon-button" id="themeToggleBtn" type="button" title="Alternar tema">
            <i data-lucide="sun-moon"></i>
          </button>
          <button class="button" id="exportBtn" type="button">
            <i data-lucide="download"></i>
            <span>Exportar</span>
          </button>
          <button class="button danger" id="resetBtn" type="button">
            <i data-lucide="rotate-ccw"></i>
            <span>Reset</span>
          </button>
          <button class="button" id="logoutBtn" type="button">
            <i data-lucide="log-out"></i>
            <span>Sair</span>
          </button>
        </div>
      </header>

      <main class="shell">
        <section class="summary-grid" id="summary"></section>

        <section class="workspace">
          <aside class="side-panel">
            <div class="panel-heading">
              <h2>Plano</h2>
              <span id="planVersion">v5</span>
            </div>
            <div class="tabs" id="phaseTabs"></div>
            <label>
              Semana
              <select id="weekSelect"></select>
            </label>
            <div class="mini-panel" id="methodologyPanel"></div>
          </aside>

          <section class="week-panel" id="weeks"></section>
        </section>
      </main>
    </div>
  </body>
</html>
